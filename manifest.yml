app:
  runtime:
    architecture: arm64
    memoryMB: 256
    name: nodejs24.x
  id: ari:cloud:ecosystem::app/0ee09c06-5b95-4d5b-9438-36bf206284ae
modules:
  rovo:agent:
    - key: forge-rovo-partner-portal
      name: Partner Portal Agent
      description: An agent for working with the Partner Portal from an external site
      actions:
        - search-partner-portal
      conversationStarters:
        - Search the Partner Portal for pages about Rovo
      prompt: resource:agent-prompts;agent-instructions.md
  action:
    - key: search-partner-portal
      name: Search Partner Portal content
      description: |
        Search the content of Partner Portal using CQL. Returns the page title, content, and metadata.
      actionVerb: GET
      function: searchPartnerPortal
      inputs:
        searchText:
          title: Search Text
          description: |
            The text string to search in Partner Portal.
          required: true
          type: string
  function:
    - key: searchPartnerPortal
      handler: index.confluenceCqlSearch
permissions:
  scopes:
    - search:confluence
    - read:chat:rovo
  external:
    fetch:
      backend:
        - address: https://api.atlassian.com
resources:
  - key: agent-prompts
    path: prompts
