[project]
name = "forge-rovo-partner-portal"
revision = "1.0"

[profiles.default]
FORGE_SITE = { description = "Atlassian site (e.g. your-site.atlassian.net) the forge:install/upgrade/uninstall npm scripts target", required = true }
FORGE_PRODUCT = { description = "Atlassian product (e.g. confluence, jira) the forge:install/upgrade/uninstall npm scripts target", default = confluence }
FORGE_ENVIRONMENT = { description = "Forge environment the forge:* npm scripts target (e.g. development, staging, production)", default = development }
CONFLUENCE_CLOUD_ID = { description = "Cloud ID of the Atlassian site hosting the Partner Portal Confluence space", required = true }
CONFLUENCE_SERVICE_ACCOUNT = { description = "Email of the Confluence service account used to call the Search API", required = true }
CONFLUENCE_API_TOKEN = { description = "API token for the Confluence service account", required = true }
